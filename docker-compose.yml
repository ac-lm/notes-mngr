services:
  postgres:
    image: postgres:15-alpine
    container_name: notes-postgres
    environment:
      POSTGRES_DB: notes_db
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - notes-network

  backend:
    build: ./Notes_Manager_Backend
    container_name: nm-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notes_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SERVER_SSL_ENABLED: false
    networks:
      - notes-network

  frontend:
    build: ./Notes_Manager_Frontend
    container_name: nm-frontend
    ports:
      - "5500:5500"
    depends_on:
      - backend
    networks:
      - notes-network

volumes:
  postgres-data:

networks:
  notes-network:
    driver: bridge